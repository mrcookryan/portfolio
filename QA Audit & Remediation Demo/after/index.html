<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Training Module</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <header class="site-header">
    <h1>Training Module</h1>
  </header>

  <main>
    <section aria-labelledby="continue-heading">
      <h2 id="continue-heading">Continue to the Next Step</h2>
      <p>Use the button below to move forward in the training.</p>

      <button type="button" class="cta">Continue</button>
    </section>

    <figure>
      <img src="trainer.jpg" alt="Instructor presenting training material">
      <figcaption>Training instructor</figcaption>
    </figure>

    <section aria-labelledby="note-heading">
      <h2 id="note-heading">Important Note</h2>
      <p class="high-contrast">This text meets WCAG contrast requirements.</p>
    </section>
  </main>

  <footer class="site-footer">
    <p>&copy; 2026 Training Demo</p>
  </footer>
</body>
</html>
