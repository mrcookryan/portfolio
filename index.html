<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Ryan — Front-End & Web Systems Portfolio</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    :root {
      --bg: #0f172a;
      --text: #e5e7eb;
      --accent: #38bdf8;
      --accent-dark: #0ea5e9;
      --font: system-ui, sans-serif;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      margin: 0;
      padding: 2rem;
      line-height: 1.6;
    }

    h1 {
      text-align: center;
      margin-bottom: 2rem;
      font-size: 2rem;
    }

    ul {
      list-style: none;
      padding: 0;
      max-width: 600px;
      margin: 0 auto;
    }

    li {
      background: #1e293b;
      padding: 1rem 1.5rem;
      border-radius: 0.75rem;
      margin-bottom: 1rem;
      transition: background 0.2s ease;
    }

    li:hover {
      background: #334155;
    }

    a {
      color: var(--accent);
      text-decoration: none;
      font-size: 1.1rem;
      font-weight: 600;
    }

    a:hover {
      color: var(--accent-dark);
    }
  </style>
</head>

<body>
  <h1>Ryan — Front-End & Web Systems Portfolio</h1>

  <ul>
    <li><a href="508-compliance-example/">508 Compliance Example</a></li>
    <li><a href="qa-audit-remediation-demo/">QA Audit & Remediation Demo</a></li>

</body>
</html>
